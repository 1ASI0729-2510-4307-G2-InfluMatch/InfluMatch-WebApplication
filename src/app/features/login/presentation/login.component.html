<app-language-selector></app-language-selector>

<mat-card class="login-card">
  <mat-card-header>
    <mat-card-title>
      <h1>{{ 'login.title' | translate }}</h1>
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'login.email' | translate }}</mat-label>
        <input 
          matInput 
          formControlName="email" 
          type="email" 
          required
          autocomplete="email"
          [placeholder]="'login.email.placeholder' | translate" />
        <mat-error *ngIf="form.get('email')?.hasError('required')">
          {{ 'login.email.required' | translate }}
        </mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">
          {{ 'login.email.invalid' | translate }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'login.password' | translate }}</mat-label>
        <input 
          matInput 
          formControlName="password" 
          [type]="hidePassword ? 'password' : 'text'"
          required
          autocomplete="current-password"
          [placeholder]="'login.password.placeholder' | translate" />
        <button 
          mat-icon-button 
          matSuffix 
          (click)="hidePassword = !hidePassword" 
          [attr.aria-label]="'Hide password'" 
          [attr.aria-pressed]="hidePassword">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">
          {{ 'login.password.required' | translate }}
        </mat-error>
      </mat-form-field>

      <button 
        mat-raised-button 
        color="primary" 
        type="submit" 
        [disabled]="form.invalid" 
        class="submit-button">
        {{ 'login.submit' | translate }}
      </button>

      <div class="register-link">
        <span>{{ 'login.noAccount' | translate }}</span>
        <button 
          mat-button 
          color="accent" 
          type="button" 
          (click)="goToRegister()">
          {{ 'login.register' | translate }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
