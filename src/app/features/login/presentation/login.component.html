<mat-card class="login-card">
  <h1 i18n="@@login.title">Iniciar sesión</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label i18n="@@login.email">Correo electrónico</mat-label>
      <input matInput formControlName="email" type="email" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label i18n="@@login.password">Contraseña</mat-label>
      <input matInput formControlName="password" type="password" required />
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid" i18n="@@login.submit">
      Iniciar sesión
    </button>

    <div class="register-link">
      <span i18n="@@login.noAccount">¿No tienes una cuenta?</span>
      <button mat-button color="accent" type="button" (click)="goToRegister()" i18n="@@login.register">
        Regístrate aquí
      </button>
    </div>
  </form>
</mat-card>
